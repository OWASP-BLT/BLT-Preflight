name: BLT Preflight Advisory

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issues:
    types: [opened, labeled]

permissions:
  pull-requests: write
  issues: write
  contents: read

jobs:
  security-advisory:
    runs-on: ubuntu-latest
    name: Security Advisory Check

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Get PR files
        if: github.event_name == 'pull_request'
        id: pr-files
        uses: actions/github-script@v7
        with:
          retries: 3
          retry-exempt-status-codes: 400,401,404
          script: |
            // Helper function for exponential backoff retry with rate limit monitoring
            async function retryWithBackoff(fn, maxRetries = 3, initialDelay = 2000) {
              let lastError;
              
              for (let attempt = 1; attempt <= maxRetries; attempt++) {
                try {
                  // Check rate limit before making API call
                  const { data: rateLimit } = await github.rest.rateLimit.get();
                  const remaining = rateLimit.rate.remaining;
                  const resetTime = new Date(rateLimit.rate.reset * 1000);
                  
                  console.log(`Rate limit status: ${remaining} requests remaining, resets at ${resetTime}`);
                  
                  // If rate limit is low, wait until reset
                  if (remaining < 10) {
                    const waitTime = resetTime.getTime() - Date.now();
                    if (waitTime > 0) {
                      console.log(`Rate limit low. Waiting ${Math.ceil(waitTime / 1000)}s until reset...`);
                      await new Promise(resolve => setTimeout(resolve, waitTime + 1000));
                    }
                  }
                  
                  // Execute the function
                  return await fn();
                  
                } catch (error) {
                  lastError = error;
                  
                  // Log error details with specific information
                  const isRateLimitError = error.status === 403 && 
                    (error.message.includes('rate limit') || error.message.includes('API rate limit'));
                  
                  if (isRateLimitError) {
                    console.error(`Attempt ${attempt}/${maxRetries} failed: Rate limit exceeded`);
                  } else {
                    console.error(`Attempt ${attempt}/${maxRetries} failed:`, error.message);
                  }
                  
                  if (attempt < maxRetries) {
                    const delay = initialDelay * Math.pow(2, attempt - 1);
                    console.log(`Retrying in ${delay}ms...`);
                    await new Promise(resolve => setTimeout(resolve, delay));
                  } else {
                    console.error('All retry attempts exhausted');
                    throw error;
                  }
                }
              }
              
              throw lastError;
            }
            
            // Get PR files with retry logic
            const files = await retryWithBackoff(async () => {
              const { data } = await github.rest.pulls.listFiles({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
              });
              return data;
            });
            
            return files.map(f => f.filename).join(',');

      - name: Get PR labels
        if: github.event_name == 'pull_request'
        id: pr-labels
        uses: actions/github-script@v7
        with:
          script: |
            const labels = context.payload.pull_request.labels.map(l => l.name);
            return labels.join(',');

      - name: Get issue labels
        if: github.event_name == 'issues'
        id: issue-labels
        run: |
          echo "labels=${{ join(github.event.issue.labels.*.name, ',') }}" >> $GITHUB_OUTPUT

      - name: Generate security advisory
        id: advisory
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            FILES="${{ steps.pr-files.outputs.result }}"
            LABELS="${{ steps.pr-labels.outputs.result }}"
          else
            FILES=""
            LABELS="${{ steps.issue-labels.outputs.labels }}"
          fi

          # Remove quotes from the output
          FILES=$(echo $FILES | tr -d '"')
          LABELS=$(echo $LABELS | tr -d '"')

          python3 src/blt_preflight.py advise \
            --labels "$LABELS" \
            --files "$FILES" \
            --repo "${{ github.repository }}" \
            --output /tmp/advisory.md \
            --json /tmp/advisory.json

          # Set output for posting
          echo "advisory_generated=true" >> $GITHUB_OUTPUT

      - name: Post advisory as comment
        if: github.event_name == 'pull_request' && steps.advisory.outputs.advisory_generated == 'true'
        uses: actions/github-script@v7
        with:
          retries: 3
          retry-exempt-status-codes: 400,401,404
          script: |
            const fs = require('fs');
            const advisory = fs.readFileSync('/tmp/advisory.md', 'utf8');

            // Helper function for exponential backoff retry with rate limit monitoring
            async function retryWithBackoff(fn, maxRetries = 3, initialDelay = 2000) {
              let lastError;
              
              for (let attempt = 1; attempt <= maxRetries; attempt++) {
                try {
                  // Check rate limit before making API call
                  const { data: rateLimit } = await github.rest.rateLimit.get();
                  const remaining = rateLimit.rate.remaining;
                  const resetTime = new Date(rateLimit.rate.reset * 1000);
                  
                  console.log(`Rate limit status: ${remaining} requests remaining, resets at ${resetTime}`);
                  
                  // If rate limit is low, wait until reset
                  if (remaining < 10) {
                    const waitTime = resetTime.getTime() - Date.now();
                    if (waitTime > 0) {
                      console.log(`Rate limit low. Waiting ${Math.ceil(waitTime / 1000)}s until reset...`);
                      await new Promise(resolve => setTimeout(resolve, waitTime + 1000));
                    }
                  }
                  
                  // Execute the function
                  return await fn();
                  
                } catch (error) {
                  lastError = error;
                  
                  // Log error details with specific information
                  const isRateLimitError = error.status === 403 && 
                    (error.message.includes('rate limit') || error.message.includes('API rate limit'));
                  
                  if (isRateLimitError) {
                    console.error(`Attempt ${attempt}/${maxRetries} failed: Rate limit exceeded`);
                  } else {
                    console.error(`Attempt ${attempt}/${maxRetries} failed:`, error.message);
                  }
                  
                  if (attempt < maxRetries) {
                    const delay = initialDelay * Math.pow(2, attempt - 1);
                    console.log(`Retrying in ${delay}ms...`);
                    await new Promise(resolve => setTimeout(resolve, delay));
                  } else {
                    console.error('All retry attempts exhausted');
                    throw error;
                  }
                }
              }
              
              throw lastError;
            }

            // Check if we already posted an advisory (with retry)
            const comments = await retryWithBackoff(async () => {
              const { data } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
              });
              return data;
            });

            const botComment = comments.find(comment => 
              comment.user.type === 'Bot' && 
              comment.body.includes('BLT Preflight Security Advisory')
            );

            if (botComment) {
              // Update existing comment (with retry)
              await retryWithBackoff(async () => {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: botComment.id,
                  body: advisory
                });
                console.log('Successfully updated existing advisory comment');
              });
            } else {
              // Create new comment (with retry)
              await retryWithBackoff(async () => {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.payload.pull_request.number,
                  body: advisory
                });
                console.log('Successfully created new advisory comment');
              });
            }

      - name: Post advisory to issue
        if: github.event_name == 'issues' && steps.advisory.outputs.advisory_generated == 'true'
        uses: actions/github-script@v7
        with:
          retries: 3
          retry-exempt-status-codes: 400,401,404
          script: |
            const fs = require('fs');
            const advisory = fs.readFileSync('/tmp/advisory.md', 'utf8');

            // Helper function for exponential backoff retry with rate limit monitoring
            async function retryWithBackoff(fn, maxRetries = 3, initialDelay = 2000) {
              let lastError;
              
              for (let attempt = 1; attempt <= maxRetries; attempt++) {
                try {
                  // Check rate limit before making API call
                  const { data: rateLimit } = await github.rest.rateLimit.get();
                  const remaining = rateLimit.rate.remaining;
                  const resetTime = new Date(rateLimit.rate.reset * 1000);
                  
                  console.log(`Rate limit status: ${remaining} requests remaining, resets at ${resetTime}`);
                  
                  // If rate limit is low, wait until reset
                  if (remaining < 10) {
                    const waitTime = resetTime.getTime() - Date.now();
                    if (waitTime > 0) {
                      console.log(`Rate limit low. Waiting ${Math.ceil(waitTime / 1000)}s until reset...`);
                      await new Promise(resolve => setTimeout(resolve, waitTime + 1000));
                    }
                  }
                  
                  // Execute the function
                  return await fn();
                  
                } catch (error) {
                  lastError = error;
                  
                  // Log error details with specific information
                  const isRateLimitError = error.status === 403 && 
                    (error.message.includes('rate limit') || error.message.includes('API rate limit'));
                  
                  if (isRateLimitError) {
                    console.error(`Attempt ${attempt}/${maxRetries} failed: Rate limit exceeded`);
                  } else {
                    console.error(`Attempt ${attempt}/${maxRetries} failed:`, error.message);
                  }
                  
                  if (attempt < maxRetries) {
                    const delay = initialDelay * Math.pow(2, attempt - 1);
                    console.log(`Retrying in ${delay}ms...`);
                    await new Promise(resolve => setTimeout(resolve, delay));
                  } else {
                    console.error('All retry attempts exhausted');
                    throw error;
                  }
                }
              }
              
              throw lastError;
            }

            // Create advisory comment on issue (with retry)
            await retryWithBackoff(async () => {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                body: advisory
              });
              console.log('Successfully posted advisory to issue');
            });

      - name: Upload advisory artifact
        if: steps.advisory.outputs.advisory_generated == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: security-advisory
          path: |
            /tmp/advisory.md
            /tmp/advisory.json
